name: CI

on:
  workflow_call:
  push:
    tags-ignore:
      - 'v*'
  pull_request:

defaults:
  run:
    working-directory: python

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "python/.python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync development dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/unit

  integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "python/.python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync development dependencies
        run: uv sync --dev

      - name: Run integration tests
        run: uv run pytest tests/integration

  e2e:
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: ${{ secrets['GOOGLE_API_KEY'] }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "python/.python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync development dependencies
        run: uv sync --dev

      - name: Run E2E tests
        run: uv run pytest tests/e2e
