name: Publish

on:
  push:
    tags:
      - "v*"

defaults:
  run:
    working-directory: python

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  publish:
    runs-on: ubuntu-latest
    needs:
      - ci
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "python/.python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build distributions
        run: uv build --no-sources

      - name: Smoke test wheel
        run: uv run --isolated --no-project --with dist/*.whl --with pytest -- python -m pytest tests/smoke/test_smoke.py

      - name: Smoke test source distribution
        run: uv run --isolated --no-project --with dist/*.tar.gz --with pytest -- python -m pytest tests/smoke/test_smoke.py

      - name: Publish to PyPI
        run: uv publish
